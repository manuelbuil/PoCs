apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagepatcher
  namespace: imagepatcher
  labels:
    app: imagepatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imagepatcher
  template:
    metadata:
      labels:
        app: imagepatcher
    spec:
      serviceAccountName: imagepatcher
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: imagepatcher
          image: mbuilsuse/imagepatcher:testing1-20260226
          imagePullPolicy: Always
          env:
            - name: IMAGEPATCHER_WRITE_HELMCHARTCONFIG
              value: "true"
            - name: IMAGEPATCHER_MANIFESTS_DIR
              value: /host-rke2-manifests
            - name: IMAGEPATCHER_HELMCHARTCONFIG_FILE
              value: rke2-traefik-config.yaml
            - name: IMAGEPATCHER_HELMCHARTCONFIG_NAME
              value: rke2-traefik
          volumeMounts:
            - name: rke2-manifests
              mountPath: /host-rke2-manifests
      volumes:
        - name: rke2-manifests
          hostPath:
            path: /var/lib/rancher/rke2/server/manifests
            type: Directory
